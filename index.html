<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oussama Chaabouni — Software Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0b0a;
    --bg-2: #131211;
    --bg-3: #1a1916;
    --line: rgba(255, 245, 230, 0.08);
    --line-2: rgba(255, 245, 230, 0.14);
    --ink: #f4ede0;
    --ink-2: rgba(244, 237, 224, 0.72);
    --ink-3: rgba(244, 237, 224, 0.5);
    --ink-4: rgba(244, 237, 224, 0.32);
    --accent: oklch(0.80 0.14 65);
    --accent-soft: oklch(0.80 0.14 65 / 0.14);
    --sans: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'JetBrains Mono', Menlo, monospace;
    --serif: 'Fraunces', ui-serif, Georgia, serif;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { font-size: 16px; line-height: 1.55; overflow-x: hidden; }
  * { box-sizing: border-box; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: #14110a; }

  /* subtle grain noise overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.035;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  #root { position: relative; z-index: 2; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" src="src/sections.jsx"></script>
<script type="text/babel" src="src/main.jsx"></script>
</body>
</html>
